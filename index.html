<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Simple Casino</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d0d0d">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div id="app-container">
        <!-- Home Screen -->
        <main id="home-screen">
            <header>
                <h1>CASINO</h1>
                <p>Welcome, Player. Choose your game.</p>
            </header>

            <div class="game-grid">
                <div class="game-card glass" id="launch-blackjack">
                    <div class="badge">POPULAR</div>
                    <h3>Blackjack</h3>
                    <p>Beat the dealer to 21.</p>
                </div>
                <!-- Future games can be added here -->
                <div class="game-card glass" style="opacity: 0.5; cursor: not-allowed;">
                    <div class="badge" style="background: #444; color: #fff;">COMING SOON</div>
                    <h3>Roulette</h3>
                    <p>Spin the wheel of fortune.</p>
                </div>
            </div>
        </main>

        <!-- Blackjack Game View -->
        <div id="blackjack-view" class="game-view">
            <div class="game-header glass">
                <button class="btn-back" id="exit-blackjack">← BACK</button>
                <div class="game-title">BLACKJACK</div>
                <div class="balance">Balance: $<span id="balance-val">1000</span></div>
            </div>

            <div id="blackjack-game">
                <div class="table-area">
                    <div class="dealer-section">
                        <div class="hand-label">DEALER <span id="dealer-score"></span></div>
                        <div id="dealer-hand" class="hand"></div>
                        <div id="dealer-score-overlay" class="score-overlay"></div>
                    </div>

                    <div class="player-section">
                        <div class="hand-label">YOU <span id="player-score"></span></div>
                        <div id="player-hand" class="hand"></div>
                        <div id="player-score-overlay" class="score-overlay"></div>
                    </div>
                </div>

                <div class="controls glass">
                    <div id="betting-controls">
                        <input type="number" id="bet-input" value="10" min="1" step="1" class="glass" style="padding: 10px; color: #fff; width: 80px;">
                        <button id="deal-btn" class="btn btn-primary">DEAL</button>
                    </div>
                    <div id="game-controls" style="display: none; gap: 10px;">
                        <button id="hit-btn" class="btn btn-secondary">HIT</button>
                        <button id="stand-btn" class="btn btn-secondary">STAND</button>
                        <button id="double-btn" class="btn btn-secondary">DOUBLE</button>
                    </div>
                </div>

                <div id="status-overlay" class="status-overlay glass">
                    <h2 id="status-msg">WINNER!</h2>
                    <button id="play-again-btn" class="btn btn-primary">PLAY AGAIN</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="js/games/blackjack.js"></script>
</body>
</html>
